name: Build and upload to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheel for Python ${{ matrix.pyver }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        pyver: [ '310', '311', '312', '313', '314' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels (Linux)
        env:
          CIBW_BEFORE_ALL_LINUX: >
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y epel-release || true;
              dnf --enablerepo=powertools install -y vulkan-headers vulkan-loader-devel || true;
              dnf install -y libX11-devel libXext-devel libXdamage-devel libXfixes-devel xcb-util-devel libxcb-devel;
            else
              yum install -y epel-release || true;
              yum install -y libX11-devel libXext-devel libXdamage-devel libXfixes-devel libxcb-devel vulkan-devel;
            fi
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: cp${{ matrix.pyver }}-*
          CIBW_TEST_COMMAND: "python -c 'import upscaler.capture'"
          CIBW_BUILD_VERBOSITY: 3
          CIBW_SKIP: "*-musllinux*"
          # Pre-install PySide6 with uv to avoid build problems with Python 3.14
          CIBW_BEFORE_TEST: "pip install uv && uv pip install PySide6"
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-cp${{ matrix.pyver }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload wheels to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

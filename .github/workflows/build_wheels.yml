name: Build and upload to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheel for Python ${{ matrix.pyver }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        pyver: [ '310', '311', '312', '313', '314' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels (Linux)
        env:
          CIBW_BEFORE_ALL_LINUX: >
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y epel-release || true;
              dnf --enablerepo=powertools install -y vulkan-headers vulkan-loader-devel || true;
              dnf install -y libX11-devel libXext-devel libXdamage-devel libXfixes-devel xcb-util-devel libxcb-devel;
            else
              yum install -y epel-release || true;
              yum install -y libX11-devel libXext-devel libXdamage-devel libXfixes-devel libxcb-devel vulkan-devel;
            fi
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: cp${{ matrix.pyver }}-*
          CIBW_TEST_COMMAND: "python -c 'import upscaler.capture'"
          CIBW_BUILD_VERBOSITY: 3
          CIBW_SKIP: "*-musllinux*"
          # Pre-install PySide6 with uv to avoid build problems with Python 3.14
          CIBW_BEFORE_TEST: "pip install uv && uv pip install PySide6"
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-cp${{ matrix.pyver }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload wheels to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: build_wheels
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak & SDK
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform/x86_64/6.6 org.kde.Sdk/x86_64/6.6

      - name: Generate python-dependencies.json from requirements.txt
        run: |
          pip install --dry-run --report python-dependencies.json -r requirements.txt --prefix /app

      - name: Build Flatpak
        run: |
          flatpak-builder --repo=repo --force-clean --state-dir=flatpak-builder build-dir org.linux_rt_upscaler.gui.yml

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle repo linux-rt-upscaler.flatpak org.linux_rt_upscaler.gui --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: linux-rt-upscaler.flatpak

  upload_flathub:
    name: Push to Flathub (beta)
    runs-on: ubuntu-latest
    needs: flatpak
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak
        run: sudo apt install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build repo
        run: |
          flatpak-builder --repo=repo --force-clean build-dir org.linux_rt_upscaler.gui.yml

      - name: Push to Flathub
        uses: flathub-infra/flatpak-github-actions/flat-manager@v1
        with:
          flat-manager-url: https://hub.flathub.org/
          repo: beta
          token: ${{ secrets.FLATHUB_TOKEN }}
          repository: flathub-repo